<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg {
      fill: #333333;
    }
    .text {
      fill: #f4f3ef;
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 44px;
      letter-spacing: -1px;
    }
    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #e6e5e1;
      }
      .text {
        fill: #141414;
      }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="24" ry="24" />
  <text class="text" x="50" y="54" dominant-baseline="middle" text-anchor="middle">LE</text>
</svg>
